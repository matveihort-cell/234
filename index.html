
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Поздравление для Юли</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    .card {
      background: #fff;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      text-align: center;
      max-width: 90%;
    }
    h1 { color: #e91e63; }
    .flower { font-size: 40px; margin: 10px 0; }
    button {
      margin-top: 15px;
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      background: #e91e63;
      color: #fff;
      cursor: pointer;
      width: 100%;
    }
    .kiss {
      position: absolute;
      font-size: 32px;
      z-index: 9999;
      animation: fly 2s forwards;
    }
    @keyframes fly {
      0% {opacity: 1; transform: translate(0,0) scale(1);}
      100% {opacity: 0; transform: translate(var(--x), var(--y)) scale(1.5);}
    }
  </style>
</head>
<body>
  <div class="card" id="content">
    <h1>С 8 Марта, Юля!</h1>
    <div class="flower">🌸</div>
    <p>Дорогая Юля,<br>
    Пусть этот день принесёт тебе радость, улыбки и весеннее настроение.<br>
    Будь счастлива и любима!</p>
    <button onclick="sendKiss()">Нажми на меня</button>
  </div>

  <script>
    // Время истечения ссылки (например, через 1 минуту)
    const expireTime = Date.now() + 60*1000;

    function checkExpire() {
      if (Date.now() > expireTime) {
        document.getElementById("content").innerHTML = "<h1>Ссылка недействительна</h1>";
      }
    }

    function sendKiss() {
      checkExpire();
      if (Date.now() > expireTime) return;
      for (let i = 0; i < 20; i++) {
        let kiss = document.createElement("div");
        kiss.className = "kiss";
        kiss.textContent = "💋";
        kiss.style.left = (window.innerWidth/2) + "px";
        kiss.style.top = (window.innerHeight/2) + "px";
        let dx = (Math.random() * 600 - 300) + "px";
        let dy = (Math.random() * -600) + "px";
        kiss.style.setProperty("--x", dx);
        kiss.style.setProperty("--y", dy);
        document.body.appendChild(kiss);
        setTimeout(() => kiss.remove(), 2000);
      }
    }
  </script>
</body>
</html>
