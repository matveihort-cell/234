<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Поздравление с 8 марта</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #333;
      overflow: hidden;
    }
    .card {
      background: #fff;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      text-align: center;
      max-width: 500px;
      animation: fadeIn 2s ease;
      position: relative;
      z-index: 1;
    }
    h1 {
      color: #e91e63;
      margin-bottom: 20px;
    }
    p {
      font-size: 18px;
      line-height: 1.5;
    }
    .flower {
      font-size: 50px;
      margin: 20px 0;
      animation: pulse 2s infinite;
    }
    button {
      margin-top: 20px;
      padding: 12px 25px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #e91e63;
      color: #fff;
      cursor: pointer;
      transition: transform 0.2s, background 0.3s;
    }
    button:hover {
      background: #d81b60;
      transform: scale(1.1);
    }
    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }
    @keyframes pulse {
      0% {transform: scale(1);}
      50% {transform: scale(1.2);}
      100% {transform: scale(1);}
    }
    .kiss {
      position: absolute;
      font-size: 40px;
      z-index: 9999;
      animation: fly 2s forwards;
    }
    @keyframes fly {
      0% {opacity: 1; transform: translate(0,0) scale(1);}
      100% {opacity: 0; transform: translate(var(--x), var(--y)) scale(1.5);}
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>С 8 Марта, Юля!</h1>
    <div class="flower">🌸</div>
    <p>Дорогая Юля,<br>
    Пусть этот день принесёт тебе радость, улыбки и весеннее настроение.<br>
    Будь счастлива и любима!</p>
    <button onclick="sendKiss()">Нажми на меня</button>
  </div>

  <script>
    function sendKiss() {
      for (let i = 0; i < 30; i++) { // много поцелуев
        let kiss = document.createElement("div");
        kiss.className = "kiss";
        kiss.textContent = "💋";
        // стартовая позиция — центр экрана
        kiss.style.left = (window.innerWidth/2) + "px";
        kiss.style.top = (window.innerHeight/2) + "px";
        // случайное направление
        let dx = (Math.random() * 600 - 300) + "px";
        let dy = (Math.random() * -600) + "px"; // вверх и в стороны
        kiss.style.setProperty("--x", dx);
        kiss.style.setProperty("--y", dy);
        document.body.appendChild(kiss);
        setTimeout(() => kiss.remove(), 2000);
      }
    }
  </script>
</body>
</html>
